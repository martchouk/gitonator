workflow:
  id: github_issue_workflow
  entity: issue
  version: 1
  source_of_truth:
    implementation_files:
      - workflow.go
      - dispatch.go
      - webhook.go
    extracted_on: "2026-05-13"
  description: >
    Current workflow for the GitHub issue entity as implemented by the
    github.mcp server. This file intentionally excludes application transport,
    bridge polling, persistence schema, and MCP inspection workflows except
    where they define issue-state behavior.

issue_state_model:
  state_storage:
    type: github_label
    label_prefix: "status:"
    intended_cardinality: one_active_status_label
    current_implementation_detail: >
      The server scans issue labels and uses the last label whose name starts
      with status:. Transition actions remove all status:* labels and append
      the target status.
  bootstrap:
    when: "Issue has no status:* label."
    set_status: status:new
    preserve_non_status_labels: true
    next_actor_role: po
  stakeholder_resolution:
    strategy:
      - "Use first issue label whose lowercase name starts with stakeholder:."
      - "Trim stakeholder: prefix and whitespace."
      - "If no stakeholder label exists, use issue.user.login."
    note: "The implementation lowercases only for prefix matching, not for trimming the original prefix."
  approval_signal:
    source: issue_comment
    recognized_when: "A comment body contains a line that is exactly /approve after whitespace trimming."
    recognized_for_validation_when: "The comment author equals the resolved stakeholder."

statuses:
  - id: status:new
    role: po
    queues_work: true
    terminal: false
  - id: status:po-analysis
    role: po
    queues_work: true
    terminal: false
  - id: status:ready-for-requirements-review
    role: reviewer
    queues_work: true
    terminal: false
  - id: status:requirements-review-in-progress
    role: reviewer
    queues_work: true
    terminal: false
  - id: status:awaiting-stakeholder-approval
    role: stakeholder
    queues_work: false
    wait_for: stakeholder_approve_comment
    terminal: false
  - id: status:architect-analysis
    role: architect
    queues_work: true
    terminal: false
  - id: status:approved-for-dev
    role: developer
    queues_work: true
    terminal: false
  - id: status:in-progress
    role: developer
    queues_work: true
    terminal: false
  - id: status:ready-for-review
    role: reviewer
    queues_work: true
    terminal: false
  - id: status:review-in-progress
    role: reviewer
    queues_work: true
    terminal: false
  - id: status:changes-requested
    role: developer
    queues_work: true
    terminal: false
  - id: status:ready-for-po-review
    role: po
    queues_work: true
    terminal: false
  - id: status:po-review-in-progress
    role: po
    queues_work: true
    terminal: false
  - id: status:awaiting-final-stakeholder-approval
    role: stakeholder
    queues_work: false
    wait_for: stakeholder_approve_comment
    terminal: false
  - id: status:blocked
    role: po
    queues_work: true
    terminal: false
    note: "No explicit unblock transition to a previous status is implemented."
  - id: status:done
    role: done
    queues_work: false
    terminal: true
  - id: status:rejected
    role: rejected
    queues_work: false
    terminal: true

transition_validation:
  required_inputs:
    - current_issue_status
    - target_status
    - actor_role
    - issue_comments
  rules:
    - "actor_role must not be empty."
    - "target_status must be one of statuses[].id."
    - "A transition must exist from current_issue_status to target_status."
    - "actor_role must be listed in transition.allowed_roles."
    - "If transition.requires_stakeholder_approve is true, the resolved stakeholder must have made a recognized /approve comment."
  rejection_result:
    allowed: false
    reason_sources:
      - actor_role_missing
      - target_status_unknown
      - no_matching_transition
      - role_not_allowed
      - stakeholder_approve_missing

transition_actions:
  on_apply:
    - action: replace_status_label
      behavior: "Remove all status:* labels and append target status."
    - action: preserve_non_status_labels
    - action: assign_issue
      when: "Transition request includes a non-empty assignee."
      behavior: "Replace GitHub issue assignees with the provided assignee."
    - action: post_comment
      when: "Transition request includes a non-empty comment."
  on_stakeholder_approve_comment:
    - action: replace_status_label
      behavior: "Remove all status:* labels and append the approval target status."
    - action: preserve_non_status_labels
    - action: continue_issue_processing
      behavior: "After applying the status change, compute the next issue role/work state."

transitions:
  - id: po_begin_analysis
    from:
      - status:new
      - status:po-analysis
    to: status:po-analysis
    allowed_roles:
      - po
    queues_next_role: po
    requires_stakeholder_approve: false
    description: "PO starts or continues issue analysis."

  - id: po_submit_requirements_for_review
    from:
      - status:new
      - status:po-analysis
    to: status:ready-for-requirements-review
    allowed_roles:
      - po
    queues_next_role: reviewer
    requires_stakeholder_approve: false
    description: "PO publishes analysis for requirements review."

  - id: reviewer_begin_requirements_review
    from:
      - status:ready-for-requirements-review
      - status:requirements-review-in-progress
    to: status:requirements-review-in-progress
    allowed_roles:
      - reviewer
    queues_next_role: reviewer
    requires_stakeholder_approve: false
    description: "Reviewer starts or continues requirements review."

  - id: reviewer_return_requirements_to_po
    from:
      - status:ready-for-requirements-review
      - status:requirements-review-in-progress
    to: status:po-analysis
    allowed_roles:
      - reviewer
    queues_next_role: po
    requires_stakeholder_approve: false
    description: "Reviewer sends requirements back to PO for rework."

  - id: reviewer_request_stakeholder_approval
    from:
      - status:requirements-review-in-progress
    to: status:awaiting-stakeholder-approval
    allowed_roles:
      - reviewer
    queues_next_role: null
    wait_for: stakeholder_approve_comment
    requires_stakeholder_approve: false
    description: "Reviewer accepts requirements and requests stakeholder sign-off."

  - id: stakeholder_approve_requirements
    from:
      - status:awaiting-stakeholder-approval
    to: status:architect-analysis
    allowed_roles:
      - stakeholder
      - po
    queues_next_role: architect
    requires_stakeholder_approve: true
    trigger:
      preferred: stakeholder_approve_comment
      also_supported_by_validation: manual_transition_with_existing_approve_comment
    description: "Approved requirements move to architect analysis."

  - id: architect_submit_architecture
    from:
      - status:architect-analysis
    to: status:approved-for-dev
    allowed_roles:
      - architect
    queues_next_role: developer
    requires_stakeholder_approve: false
    description: "Architect hands off analyzed issue to development."

  - id: developer_begin_implementation
    from:
      - status:approved-for-dev
      - status:changes-requested
      - status:in-progress
    to: status:in-progress
    allowed_roles:
      - developer
    queues_next_role: developer
    requires_stakeholder_approve: false
    description: "Developer starts or continues implementation."

  - id: developer_submit_for_review
    from:
      - status:in-progress
      - status:changes-requested
    to: status:ready-for-review
    allowed_roles:
      - developer
    queues_next_role: reviewer
    requires_stakeholder_approve: false
    description: "Developer hands implementation to reviewer."

  - id: reviewer_begin_code_review
    from:
      - status:ready-for-review
      - status:review-in-progress
    to: status:review-in-progress
    allowed_roles:
      - reviewer
    queues_next_role: reviewer
    requires_stakeholder_approve: false
    description: "Reviewer starts or continues code review."

  - id: reviewer_request_code_changes
    from:
      - status:ready-for-review
      - status:review-in-progress
    to: status:changes-requested
    allowed_roles:
      - reviewer
    queues_next_role: developer
    requires_stakeholder_approve: false
    description: "Reviewer rejects implementation and sends it back to developer."

  - id: reviewer_accept_code
    from:
      - status:ready-for-review
      - status:review-in-progress
    to: status:ready-for-po-review
    allowed_roles:
      - reviewer
    queues_next_role: po
    requires_stakeholder_approve: false
    description: "Reviewer accepts implementation and hands it to PO."

  - id: po_begin_final_review
    from:
      - status:ready-for-po-review
      - status:po-review-in-progress
    to: status:po-review-in-progress
    allowed_roles:
      - po
    queues_next_role: po
    requires_stakeholder_approve: false
    description: "PO starts or continues final PO review."

  - id: po_request_code_changes
    from:
      - status:ready-for-po-review
      - status:po-review-in-progress
    to: status:changes-requested
    allowed_roles:
      - po
    queues_next_role: developer
    requires_stakeholder_approve: false
    description: "PO rejects implementation and sends it back to developer."

  - id: po_request_final_stakeholder_approval
    from:
      - status:ready-for-po-review
      - status:po-review-in-progress
    to: status:awaiting-final-stakeholder-approval
    allowed_roles:
      - po
    queues_next_role: null
    wait_for: stakeholder_approve_comment
    requires_stakeholder_approve: false
    description: "PO requests final stakeholder approval."

  - id: stakeholder_approve_final_delivery
    from:
      - status:awaiting-final-stakeholder-approval
    to: status:done
    allowed_roles:
      - stakeholder
      - po
    queues_next_role: null
    requires_stakeholder_approve: true
    terminal_after_transition: true
    trigger:
      preferred: stakeholder_approve_comment
      also_supported_by_validation: manual_transition_with_existing_approve_comment
    description: "Final stakeholder approval completes the issue workflow."

  - id: block_issue
    from: "*"
    from_expanded:
      - status:new
      - status:po-analysis
      - status:ready-for-requirements-review
      - status:requirements-review-in-progress
      - status:awaiting-stakeholder-approval
      - status:architect-analysis
      - status:approved-for-dev
      - status:in-progress
      - status:ready-for-review
      - status:review-in-progress
      - status:changes-requested
      - status:ready-for-po-review
      - status:po-review-in-progress
      - status:awaiting-final-stakeholder-approval
      - status:blocked
      - status:done
      - status:rejected
    to: status:blocked
    allowed_roles:
      - po
      - developer
      - reviewer
      - stakeholder
    queues_next_role: po
    requires_stakeholder_approve: false
    description: "Any active actor may block the issue."
    implementation_note: "The current code also permits blocking terminal states and blocking an already blocked issue."

  - id: reject_issue
    from: "*"
    from_expanded:
      - status:new
      - status:po-analysis
      - status:ready-for-requirements-review
      - status:requirements-review-in-progress
      - status:awaiting-stakeholder-approval
      - status:architect-analysis
      - status:approved-for-dev
      - status:in-progress
      - status:ready-for-review
      - status:review-in-progress
      - status:changes-requested
      - status:ready-for-po-review
      - status:po-review-in-progress
      - status:awaiting-final-stakeholder-approval
      - status:blocked
      - status:done
      - status:rejected
    to: status:rejected
    allowed_roles:
      - po
      - stakeholder
    queues_next_role: null
    requires_stakeholder_approve: false
    terminal_after_transition: true
    description: "PO or stakeholder may reject the issue."
    implementation_note: "The current code also permits rejecting terminal states and rejecting an already rejected issue."

approval_comment_transitions:
  - from: status:awaiting-stakeholder-approval
    to: status:architect-analysis
    required_comment_author: resolved_stakeholder
    required_comment_line: "/approve"
    queues_next_role: architect
  - from: status:awaiting-final-stakeholder-approval
    to: status:done
    required_comment_author: resolved_stakeholder
    required_comment_line: "/approve"
    queues_next_role: null
    terminal_after_transition: true

canonical_paths:
  main_success_path:
    - status:new
    - status:po-analysis
    - status:ready-for-requirements-review
    - status:requirements-review-in-progress
    - status:awaiting-stakeholder-approval
    - status:architect-analysis
    - status:approved-for-dev
    - status:in-progress
    - status:ready-for-review
    - status:review-in-progress
    - status:ready-for-po-review
    - status:po-review-in-progress
    - status:awaiting-final-stakeholder-approval
    - status:done
  requirements_rework_loop:
    - status:ready-for-requirements-review
    - status:requirements-review-in-progress
    - status:po-analysis
    - status:ready-for-requirements-review
  code_review_rework_loop:
    - status:in-progress
    - status:ready-for-review
    - status:review-in-progress
    - status:changes-requested
    - status:in-progress
  po_review_rework_loop:
    - status:ready-for-po-review
    - status:po-review-in-progress
    - status:changes-requested
    - status:in-progress
  block_path:
    - "*"
    - status:blocked
  rejection_path:
    - "*"
    - status:rejected

work_routing_from_issue_state:
  purpose: "Defines which role should receive work after an issue enters a status."
  routing:
    status:new: po
    status:po-analysis: po
    status:ready-for-requirements-review: reviewer
    status:requirements-review-in-progress: reviewer
    status:awaiting-stakeholder-approval: null
    status:architect-analysis: architect
    status:approved-for-dev: developer
    status:in-progress: developer
    status:ready-for-review: reviewer
    status:review-in-progress: reviewer
    status:changes-requested: developer
    status:ready-for-po-review: po
    status:po-review-in-progress: po
    status:awaiting-final-stakeholder-approval: null
    status:blocked: po
    status:done: null
    status:rejected: null
  assignee_hint:
    source: "First GitHub issue assignee."
    missing_value: ""
  last_comment_hint:
    source: "Last loaded issue comment id."
    missing_value: 0

current_behavior_notes_for_future_engine:
  - "The issue workflow is entirely label-driven; GitHub issue open/closed state is not part of the workflow state machine."
  - "Manual transitions and /approve comment transitions both mutate the same issue status label."
  - "Wait states do not route work to an agent role; they wait for stakeholder approval or a manual transition."
  - "There is no generic history stack for returning from status:blocked."
  - "There is no explicit reopen transition from status:done or status:rejected, but the block/reject wildcard rules currently include terminal statuses."
  - "The actor model is role-based for manual transitions, while /approve comments verify the actual GitHub username against the resolved stakeholder."

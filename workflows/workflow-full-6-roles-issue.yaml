workflow:
  id: full_6_roles_issue_workflow
  key: full
  entity: issue
  version: 1
  purpose: >
    Dead-end-free full GitHub issue workflow configuration across feature
    requests, bugs, and change requests, with PO intake, architecture, UI,
    development, review, testing, and acceptance roles.
  supported_issue_types:
    - feature_request
    - bug
    - change_request
    - smoke_test
  default_path_scope: post_intake
  roles:
    - po
    - architect
    - uidesigner
    - developer
    - reviewer
    - tester

state_storage:
  type: github_label
  status_label_prefix: "status:"
  type_label_prefix: "type:"
  cardinality:
    status: exactly_one
    type: exactly_one_or_more
  on_transition:
    - remove_labels_matching: "status:*"
    - add_target_status_label: true
    - preserve_non_status_labels: true
  metadata:
    blocked_from:
      type: previous_status
      required_when_entering: status:blocked
      used_by_transition: resume_from_blocked

issue_types:
  - id: type:feature
    name: feature_request
    default_path:
      - status:solution-design
      - status:ready-for-dev
      - status:in-development
      - status:code-review
      - status:testing
      - status:po-acceptance
      - status:done
  - id: type:bug
    name: bug
    default_path:
      - status:ready-for-dev
      - status:in-development
      - status:code-review
      - status:testing
      - status:po-acceptance
      - status:done
  - id: type:change-request
    name: change_request
    default_path:
      - status:solution-design
      - status:ready-for-dev
      - status:in-development
      - status:code-review
      - status:testing
      - status:po-acceptance
      - status:done
  - id: type:smoke-test
    name: smoke_test
    default_path:
      - status:testing
      - status:po-acceptance
      - status:done

statuses:
  - id: status:new
    role: po
    queues_work: true
    category: intake
  - id: status:triage
    role: po
    queues_work: true
    category: intake
  - id: status:solution-design
    role: architect
    queues_work: true
    category: design
  - id: status:ui-design
    role: uidesigner
    queues_work: true
    category: design
  - id: status:ready-for-dev
    role: developer
    queues_work: true
    category: implementation
  - id: status:in-development
    role: developer
    queues_work: true
    category: implementation
  - id: status:architecture-review
    role: architect
    queues_work: true
    category: review
  - id: status:ui-review
    role: uidesigner
    queues_work: true
    category: review
  - id: status:code-review
    role: reviewer
    queues_work: true
    category: review
  - id: status:testing
    role: tester
    queues_work: true
    category: verification
  - id: status:po-acceptance
    role: po
    queues_work: true
    category: acceptance
  - id: status:blocked
    role: po
    queues_work: true
    category: exception
    requires_metadata:
      - blocked_from
  - id: status:done
    role: null
    queues_work: false
    category: terminal
    terminal: true
  - id: status:rejected
    role: null
    queues_work: false
    category: terminal
    terminal: true

guards:
  smoke_test:
    description: "Issue is a workflow smoke test and should be routed to verification without implementation work."
    any_label:
      - type:smoke-test
  has_ui_impact:
    description: "Issue needs UI/UX design or visual acceptance."
    any_label:
      - area:ui
      - area:ux
      - needs:ui-design
  has_ui_impact_without_architecture:
    description: "Issue needs UI/UX design and does not need architectural design first."
    any_label:
      - area:ui
      - area:ux
      - needs:ui-design
    all_absent:
      - type:smoke-test
      - needs:architecture
      - risk:high
      - type:feature
      - type:change-request
  needs_architecture:
    description: "Issue needs architectural design or architecture review."
    any_label:
      - needs:architecture
      - risk:high
      - type:feature
      - type:change-request
    all_absent:
      - type:smoke-test
  small_safe_change:
    description: "Issue can skip architecture and UI gates."
    all_absent:
      - type:smoke-test
      - needs:architecture
      - needs:ui-design
      - area:ui
      - area:ux
      - risk:high
      - type:feature
      - type:change-request

transition_defaults:
  validation:
    - actor_role_must_be_allowed
    - from_status_must_match
    - target_status_must_exist
  actions:
    - replace_status_label
    - preserve_non_status_labels
    - optionally_assign_issue
    - optionally_post_comment

transitions:
  - id: bootstrap_new_issue
    from: null
    to: status:new
    allowed_roles:
      - system
    queues_next_role: po
    description: "Apply initial status to an issue without a status label."

  - id: po_reject_at_triage
    from:
      - status:new
      - status:triage
    to: status:rejected
    allowed_roles:
      - po
    queues_next_role: null
    terminal_after_transition: true
    close_issue: true
    required_outputs:
      - rejection_reason
    description: "PO rejects invalid, duplicate, or out-of-scope issue."

  - id: po_send_smoke_test_to_testing
    from:
      - status:new
      - status:triage
    to: status:testing
    allowed_roles:
      - po
    guard: smoke_test
    queues_next_role: tester
    required_outputs:
      - smoke_test_scope
      - expected_check
    description: "PO sends a workflow smoke-test issue directly to tester verification."

  - id: po_request_architecture
    from:
      - status:new
      - status:triage
    to: status:solution-design
    allowed_roles:
      - po
    guard: needs_architecture
    queues_next_role: architect
    required_outputs:
      - problem_statement
      - acceptance_criteria
      - constraints
    description: "PO sends issue to architect for solution design."

  - id: po_request_ui_design
    from:
      - status:new
      - status:triage
    to: status:ui-design
    allowed_roles:
      - po
    guard: has_ui_impact_without_architecture
    queues_next_role: uidesigner
    required_outputs:
      - problem_statement
      - ui_context
      - visual_acceptance_criteria
    description: "PO sends an issue directly to UI designer when UI/UX work is needed without architecture first."

  - id: architect_request_ui_design
    from:
      - status:solution-design
    to: status:ui-design
    allowed_roles:
      - po
      - architect
    guard: has_ui_impact
    queues_next_role: uidesigner
    required_outputs:
      - solution_design_summary
      - ui_design_request
    description: "PO or architect sends an architected issue to UI designer."

  - id: po_mark_ready_for_dev
    from:
      - status:new
      - status:triage
    to: status:ready-for-dev
    allowed_roles:
      - po
    guard: small_safe_change
    queues_next_role: developer
    required_outputs:
      - requirement_summary
      - acceptance_criteria
    description: "PO sends a small or clear issue directly to development."

  - id: architect_complete_solution_design
    from:
      - status:solution-design
    to: status:ready-for-dev
    allowed_roles:
      - architect
    queues_next_role: developer
    required_outputs:
      - solution_design
      - technical_risks
      - implementation_notes
    description: "Architect completes solution design and releases issue for development."

  - id: architect_return_to_po
    from:
      - status:solution-design
    to: status:triage
    allowed_roles:
      - architect
    queues_next_role: po
    required_outputs:
      - clarification_request
    description: "Architect needs PO clarification or scope decision."

  - id: ui_complete_design
    from:
      - status:ui-design
    to: status:ready-for-dev
    allowed_roles:
      - uidesigner
    queues_next_role: developer
    required_outputs:
      - ui_specification
      - visual_acceptance_criteria
    description: "UI designer completes design and releases issue for development."

  - id: ui_return_to_po
    from:
      - status:ui-design
    to: status:triage
    allowed_roles:
      - uidesigner
    queues_next_role: po
    required_outputs:
      - clarification_request
    description: "UI designer needs PO clarification or scope decision."

  - id: developer_start_work
    from:
      - status:ready-for-dev
      - status:in-development
    to: status:in-development
    allowed_roles:
      - developer
    queues_next_role: developer
    required_outputs:
      - implementation_progress
    description: "Developer starts or continues implementation."

  - id: developer_request_architecture_review
    from:
      - status:in-development
    to: status:architecture-review
    allowed_roles:
      - developer
    guard: needs_architecture
    queues_next_role: architect
    required_outputs:
      - implementation_summary
      - architecture_review_focus
    description: "Developer asks architect to review implementation or design-sensitive changes."

  - id: developer_request_ui_review
    from:
      - status:in-development
    to: status:ui-review
    allowed_roles:
      - developer
    guard: has_ui_impact
    queues_next_role: uidesigner
    required_outputs:
      - implementation_summary
      - ui_review_focus
    description: "Developer asks UI designer to review implemented UI."

  - id: developer_submit_code_review
    from:
      - status:ready-for-dev
      - status:in-development
    to: status:code-review
    allowed_roles:
      - developer
    queues_next_role: reviewer
    required_outputs:
      - implementation_summary
      - changed_files
      - verification_notes
    description: "Developer submits implementation for code review."

  - id: architect_approve_implementation
    from:
      - status:architecture-review
    to: status:code-review
    allowed_roles:
      - architect
    queues_next_role: reviewer
    required_outputs:
      - architecture_review_result
      - reviewer_notes
    description: "Architect accepts implementation and passes it to code review."

  - id: architect_reject_implementation
    from:
      - status:architecture-review
    to: status:in-development
    allowed_roles:
      - architect
    queues_next_role: developer
    required_outputs:
      - architecture_review_feedback
    description: "Architect requests implementation changes."

  - id: ui_approve_implementation
    from:
      - status:ui-review
    to: status:code-review
    allowed_roles:
      - uidesigner
    queues_next_role: reviewer
    required_outputs:
      - ui_review_result
      - reviewer_notes
    description: "UI designer accepts implementation and passes it to code review."

  - id: ui_reject_implementation
    from:
      - status:ui-review
    to: status:in-development
    allowed_roles:
      - uidesigner
    queues_next_role: developer
    required_outputs:
      - ui_review_feedback
    description: "UI designer requests implementation changes."

  - id: reviewer_approve_code
    from:
      - status:code-review
    to: status:testing
    allowed_roles:
      - reviewer
    queues_next_role: tester
    required_outputs:
      - code_review_summary
    description: "Reviewer accepts code and sends issue to testing."

  - id: reviewer_request_changes
    from:
      - status:code-review
    to: status:in-development
    allowed_roles:
      - reviewer
    queues_next_role: developer
    required_outputs:
      - code_review_feedback
    description: "Reviewer requests code changes."

  - id: tester_pass
    from:
      - status:testing
    to: status:po-acceptance
    allowed_roles:
      - tester
    queues_next_role: po
    required_outputs:
      - test_evidence
    description: "Tester verifies the issue and sends it to PO acceptance."

  - id: tester_fail
    from:
      - status:testing
    to: status:in-development
    allowed_roles:
      - tester
    queues_next_role: developer
    required_outputs:
      - failed_test_cases
      - reproduction_steps
    description: "Tester finds defects and sends issue back to development."

  - id: po_accept
    from:
      - status:po-acceptance
    to: status:done
    allowed_roles:
      - po
    queues_next_role: null
    terminal_after_transition: true
    close_issue: true
    required_outputs:
      - acceptance_decision
    description: "PO accepts the delivered issue."

  - id: po_reject_acceptance
    from:
      - status:po-acceptance
    to: status:in-development
    allowed_roles:
      - po
    queues_next_role: developer
    required_outputs:
      - po_acceptance_feedback
    description: "PO requests final changes."

  - id: po_return_to_triage
    from:
      - status:po-acceptance
    to: status:triage
    allowed_roles:
      - po
    queues_next_role: po
    required_outputs:
      - scope_or_requirement_feedback
    description: "PO sends issue back to triage when acceptance reveals a requirement or scope problem."

  - id: po_return_to_solution_design
    from:
      - status:po-acceptance
    to: status:solution-design
    allowed_roles:
      - po
    queues_next_role: architect
    required_outputs:
      - architecture_acceptance_feedback
    description: "PO sends issue back to architecture when acceptance reveals a solution-design problem."

  - id: po_return_to_ui_design
    from:
      - status:po-acceptance
    to: status:ui-design
    allowed_roles:
      - po
    queues_next_role: uidesigner
    required_outputs:
      - ui_acceptance_feedback
    description: "PO sends issue back to UI design when acceptance reveals a UX or visual-design problem."

  - id: block_issue
    from:
      - status:new
      - status:triage
      - status:solution-design
      - status:ui-design
      - status:ready-for-dev
      - status:in-development
      - status:architecture-review
      - status:ui-review
      - status:code-review
      - status:testing
      - status:po-acceptance
    to: status:blocked
    allowed_roles:
      - po
      - architect
      - uidesigner
      - developer
      - reviewer
      - tester
    queues_next_role: po
    set_metadata:
      blocked_from: "$from"
    description: "Any active worker can mark an issue blocked; PO owns unblocking coordination."

  - id: resume_from_blocked
    from:
      - status:blocked
    to: "$metadata.blocked_from"
    allowed_roles:
      - po
    queues_next_role: "$target.role"
    clear_metadata:
      - blocked_from
    description: "PO resolves the blocker and returns the issue to the state it came from."

  - id: send_blocked_to_triage
    from:
      - status:blocked
    to: status:triage
    allowed_roles:
      - po
    queues_next_role: po
    clear_metadata:
      - blocked_from
    description: "PO re-triages a blocked issue when the previous state is no longer appropriate."

  - id: reject_active_issue
    from:
      - status:solution-design
      - status:ui-design
      - status:ready-for-dev
      - status:in-development
      - status:architecture-review
      - status:ui-review
      - status:code-review
      - status:testing
      - status:po-acceptance
      - status:blocked
    to: status:rejected
    allowed_roles:
      - po
    queues_next_role: null
    terminal_after_transition: true
    close_issue: true
    required_outputs:
      - rejection_reason
    description: "PO rejects an active issue after new information or changed priorities."

  - id: reopen_done
    from:
      - status:done
    to: status:triage
    allowed_roles:
      - po
    queues_next_role: po
    required_outputs:
      - reopen_reason
    reopen_issue: true
    description: "PO reopens completed work for follow-up triage."

  - id: reopen_rejected
    from:
      - status:rejected
    to: status:triage
    allowed_roles:
      - po
    queues_next_role: po
    required_outputs:
      - reopen_reason
      - changed_context
    reopen_issue: true
    description: "PO reopens a rejected issue when circumstances change."

canonical_paths:
  feature_with_architecture_and_ui:
    - status:new
    - status:solution-design
    - status:ui-design
    - status:ready-for-dev
    - status:in-development
    - status:architecture-review
    - status:code-review
    - status:testing
    - status:po-acceptance
    - status:done
  simple_bug:
    - status:new
    - status:ready-for-dev
    - status:in-development
    - status:code-review
    - status:testing
    - status:po-acceptance
    - status:done
  ui_change:
    - status:new
    - status:ui-design
    - status:ready-for-dev
    - status:in-development
    - status:ui-review
    - status:code-review
    - status:testing
    - status:po-acceptance
    - status:done
  smoke_test:
    - status:new
    - status:testing
    - status:po-acceptance
    - status:done

loops:
  architecture_rework:
    - status:in-development
    - status:architecture-review
    - status:in-development
  ui_rework:
    - status:in-development
    - status:ui-review
    - status:in-development
  code_review_rework:
    - status:in-development
    - status:code-review
    - status:in-development
  testing_rework:
    - status:in-development
    - status:code-review
    - status:testing
    - status:in-development
  po_acceptance_rework:
    - status:in-development
    - status:code-review
    - status:testing
    - status:po-acceptance
    - status:in-development
  blocked_resume:
    - "$any_active_status"
    - status:blocked
    - "$metadata.blocked_from"

dead_end_policy:
  non_terminal_states_must_have_outgoing_transition: true
  blocked_must_have_resume_path: true
  terminal_states:
    - status:done
    - status:rejected
  terminal_states_can_be_reopened_by:
    - po
  wildcard_transitions_exclude_terminal_states: true
